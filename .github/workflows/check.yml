name: Check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install system checks on Ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y stow zsh shellcheck ripgrep
      - name: Install current Neovim on Ubuntu
        if: runner.os == 'Linux'
        run: |
          curl -fsSL https://github.com/neovim/neovim/releases/latest/download/nvim-linux-x86_64.tar.gz -o /tmp/nvim.tar.gz
          sudo tar -xzf /tmp/nvim.tar.gz -C /opt
          echo "/opt/nvim-linux-x86_64/bin" >> "$GITHUB_PATH"
      - name: Install system checks on macOS
        if: runner.os == 'macOS'
        run: brew install stow shellcheck neovim ripgrep
      - run: npm ci
      - name: Test install and restore on Debian 12
        if: runner.os == 'Linux'
        run: docker run --rm -v "$PWD:/work" -w /work debian:12-slim bash -c "apt-get update && apt-get install -y curl git stow tar && tests/install-restore.sh"
      - run: bin/bbldr-dotfiles check
        env:
          BBLDR_SKIP_DOCS: ${{ matrix.os == 'macos-latest' && '1' || '0' }}
