name: Bug report
description: Report reproducible installation, configuration, or documentation behavior.
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened and what did you expect?
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [macOS Apple Silicon, macOS Intel, Ubuntu, Debian, Other]
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands and sanitized output. Never include secrets.
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Doctor output
      description: Sanitized output from `bbldr dotfiles doctor`.
