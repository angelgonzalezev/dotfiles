set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g automatic-rename on
set -g set-titles on
set -g repeat-time 300

set -g status-interval 5
set -g display-time 5000
set -g status-justify centre
set -g status-left-length 40
set -g status-right-length 160
set -g status-style "bg=#24273a,fg=#cad3f5"
set -g message-style "bg=#363a4f,fg=#cad3f5"
set -g mode-style "bg=#b7bdf8,fg=#181926"
set -g pane-active-border-style "fg=#8aadf4"
set -g pane-border-style "fg=#363a4f"

set -g window-status-separator " "
set -g window-status-format "#[bg=#1e2030,fg=#a5adcb] #I #W "
set -g window-status-current-format "#[bg=#b7bdf8,fg=#181926,bold] #I #W "

setw -g mode-keys vi
set -sg escape-time 10

bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind c new-window -c "#{pane_current_path}"
bind x kill-pane
bind & kill-window
bind n next-window
bind p previous-window
bind -n M-1 select-pane -t 1
bind -n M-2 select-pane -t 2
bind -n M-3 select-pane -t 3
bind -n M-4 select-pane -t 4
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -n M-Left select-pane -L
bind -n M-Down select-pane -D
bind -n M-Up select-pane -U
bind -n M-Right select-pane -R

bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 5
bind -n M-K resize-pane -U 5
bind -n M-L resize-pane -R 5

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

bind -n MouseUp1Control0 display-message "⚙ CPU usage"
bind -n MouseUp1Control1 display-message "▣ tmux sessions"
bind -n MouseUp1Control2 display-message "󰔟 system uptime"
bind -n MouseUp1Control3 display-message "󰁹 battery level"

set -g status-left "#[bg=#b7bdf8,fg=#181926,bold] tmux #[bg=#363a4f,fg=#cad3f5] #S "
set -g status-right "#(~/.local/bin/tmux-status)"
