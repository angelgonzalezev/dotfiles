<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">WezTerm terminal preview</title>
  <desc id="desc">A stylized WezTerm terminal window with tabs, panes, and custom shortcuts.</desc>
  <rect width="1280" height="720" fill="#0b1020"/>
  <rect x="72" y="70" width="1136" height="580" rx="20" fill="#181825" stroke="#313244" stroke-width="2"/>
  <rect x="72" y="70" width="1136" height="58" rx="20" fill="#11111b"/>
  <circle cx="106" cy="99" r="8" fill="#f38ba8"/>
  <circle cx="134" cy="99" r="8" fill="#f9e2af"/>
  <circle cx="162" cy="99" r="8" fill="#a6e3a1"/>
  <rect x="226" y="86" width="222" height="30" rx="15" fill="#b4befe"/>
  <text x="256" y="106" fill="#11111b" font-family="JetBrains Mono, Menlo, monospace" font-size="15" font-weight="700">1 dotfiles</text>
  <rect x="466" y="86" width="190" height="30" rx="15" fill="#313244"/>
  <text x="496" y="106" fill="#cdd6f4" font-family="JetBrains Mono, Menlo, monospace" font-size="15">2 shell</text>
  <rect x="95" y="152" width="520" height="430" rx="14" fill="#11111b" stroke="#313244"/>
  <rect x="642" y="152" width="543" height="430" rx="14" fill="#11111b" stroke="#313244"/>
  <text x="126" y="195" fill="#89b4fa" font-family="JetBrains Mono, Menlo, monospace" font-size="18">$ cd ~/.config/dotfiles</text>
  <text x="126" y="235" fill="#a6e3a1" font-family="JetBrains Mono, Menlo, monospace" font-size="18">$ npm run docs:dev</text>
  <text x="126" y="275" fill="#cdd6f4" font-family="JetBrains Mono, Menlo, monospace" font-size="18">vitepress v1.6.4</text>
  <text x="126" y="315" fill="#b4befe" font-family="JetBrains Mono, Menlo, monospace" font-size="18">Local: http://127.0.0.1:3001/</text>
  <text x="674" y="195" fill="#cdd6f4" font-family="JetBrains Mono, Menlo, monospace" font-size="18">Custom shortcuts</text>
  <line x1="674" y1="216" x2="1146" y2="216" stroke="#313244"/>
  <text x="674" y="258" fill="#b4befe" font-family="JetBrains Mono, Menlo, monospace" font-size="17">Cmd Option Left</text>
  <text x="900" y="258" fill="#a6adc8" font-family="JetBrains Mono, Menlo, monospace" font-size="17">previous tab</text>
  <text x="674" y="300" fill="#b4befe" font-family="JetBrains Mono, Menlo, monospace" font-size="17">Cmd Option Right</text>
  <text x="900" y="300" fill="#a6adc8" font-family="JetBrains Mono, Menlo, monospace" font-size="17">next tab</text>
  <text x="674" y="356" fill="#f5c2e7" font-family="JetBrains Mono, Menlo, monospace" font-size="17">Ctrl Alt "</text>
  <text x="900" y="356" fill="#a6adc8" font-family="JetBrains Mono, Menlo, monospace" font-size="17">split vertical</text>
  <text x="674" y="398" fill="#f5c2e7" font-family="JetBrains Mono, Menlo, monospace" font-size="17">Ctrl Alt %</text>
  <text x="900" y="398" fill="#a6adc8" font-family="JetBrains Mono, Menlo, monospace" font-size="17">split horizontal</text>
  <rect x="95" y="603" width="1090" height="28" rx="8" fill="#313244"/>
  <text x="122" y="623" fill="#cdd6f4" font-family="JetBrains Mono, Menlo, monospace" font-size="15">WezTerm - Catppuccin Mocha, custom tabs, integrated macOS buttons</text>
</svg>
