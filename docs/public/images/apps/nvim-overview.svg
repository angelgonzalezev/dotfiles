  <circle cx="105" cy="88" r="7" fill="#f38ba8"/>
  <circle cx="130" cy="88" r="7" fill="#f9e2af"/>
  <circle cx="155" cy="88" r="7" fill="#a6e3a1"/>
  <text x="190" y="94" fill="#cdd6f4" font-family="JetBrains Mono, Menlo, monospace" font-size="17">nvim ~/.config/dotfiles</text>
  <rect x="96" y="137" width="258" height="464" rx="12" fill="#11111b" stroke="#313244"/>
  <text x="120" y="174" fill="#b4befe" font-family="JetBrains Mono, Menlo, monospace" font-size="18">Snacks picker</text>
  <text x="120" y="215" fill="#cdd6f4" font-family="JetBrains Mono, Menlo, monospace" font-size="16">Space f f</text>
  <text x="120" y="248" fill="#a6adc8" font-family="JetBrains Mono, Menlo, monospace" font-size="16">Space f g</text>
  <text x="120" y="281" fill="#a6adc8" font-family="JetBrains Mono, Menlo, monospace" font-size="16">Space f b</text>
  <line x1="120" y1="315" x2="330" y2="315" stroke="#313244"/>
  <text x="120" y="355" fill="#89b4fa" font-family="JetBrains Mono, Menlo, monospace" font-size="16">init.lua</text>
  <text x="120" y="388" fill="#cba6f7" font-family="JetBrains Mono, Menlo, monospace" font-size="16">lazy-lock.json</text>
  <text x="120" y="421" fill="#f5c2e7" font-family="JetBrains Mono, Menlo, monospace" font-size="16">docs/apps/nvim.md</text>
  <rect x="384" y="137" width="800" height="464" rx="12" fill="#11111b" stroke="#313244"/>
  <text x="416" y="178" fill="#6c7086" font-family="JetBrains Mono, Menlo, monospace" font-size="16">1</text>
  <text x="456" y="178" fill="#cba6f7" font-family="JetBrains Mono, Menlo, monospace" font-size="16">require</text>
  <text x="520" y="178" fill="#cdd6f4" font-family="JetBrains Mono, Menlo, monospace" font-size="16">(</text>
  <text x="534" y="178" fill="#a6e3a1" font-family="JetBrains Mono, Menlo, monospace" font-size="16">"lazy"</text>
  <text x="592" y="178" fill="#cdd6f4" font-family="JetBrains Mono, Menlo, monospace" font-size="16">).setup({</text>
  <text x="416" y="214" fill="#6c7086" font-family="JetBrains Mono, Menlo, monospace" font-size="16">2</text>
  <text x="456" y="214" fill="#cdd6f4" font-family="JetBrains Mono, Menlo, monospace" font-size="16">{ "folke/snacks.nvim", keys = {</text>
  <text x="416" y="250" fill="#6c7086" font-family="JetBrains Mono, Menlo, monospace" font-size="16">3</text>
  <text x="488" y="250" fill="#a6e3a1" font-family="JetBrains Mono, Menlo, monospace" font-size="16">"&lt;leader&gt;fg"</text>
  <text x="616" y="250" fill="#cdd6f4" font-family="JetBrains Mono, Menlo, monospace" font-size="16">, Snacks.picker.grep</text>
  <text x="416" y="286" fill="#6c7086" font-family="JetBrains Mono, Menlo, monospace" font-size="16">4</text>
  <text x="456" y="286" fill="#cdd6f4" font-family="JetBrains Mono, Menlo, monospace" font-size="16">} }</text>
  <text x="416" y="322" fill="#6c7086" font-family="JetBrains Mono, Menlo, monospace" font-size="16">5</text>
  <text x="456" y="322" fill="#cdd6f4" font-family="JetBrains Mono, Menlo, monospace" font-size="16">})</text>
  <rect x="384" y="613" width="800" height="28" rx="8" fill="#b4befe"/>
  <text x="410" y="633" fill="#11111b" font-family="JetBrains Mono, Menlo, monospace" font-size="15" font-weight="700">NORMAL</text>
  <text x="520" y="633" fill="#11111b" font-family="JetBrains Mono, Menlo, monospace" font-size="15">dotfiles/nvim/.config/nvim/init.lua</text>
