<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Neovim editor preview</title>
  <desc id="desc">A stylized Neovim terminal editor with file search, statusline, and Lua configuration.</desc>
  <rect width="1280" height="720" fill="#11111b"/>
  <rect x="72" y="64" width="1136" height="592" rx="18" fill="#181825" stroke="#313244" stroke-width="2"/>
